apiVersion: v1
kind: Service
metadata:
  name: matric-api
  namespace: matric-api
  labels:
    app: matric-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: matric-api
---
apiVersion: v1
kind: Service
metadata:
  name: matric-api-nodeport
  namespace: matric-api
  labels:
    app: matric-api
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: matric-api