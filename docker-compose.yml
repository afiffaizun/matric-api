version: '3.8'

services:
  matric-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: matric-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - matric-network

networks:
  matric-network:
    driver: bridge