{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "matric-api.fullname" . }}
  labels:
    {{- include "matric-api.labels" . | nindent 4 }}
    release: prometheus  # ← Penting! Harus match dengan Prometheus selector
spec:
  selector:
    matchLabels:
      {{- include "matric-api.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}